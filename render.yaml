services:
  # Backend API
  - type: web
    name: vinosstk-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backEnd
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /api/health

  # Frontend
  - type: web
    name: vinosstk-frontend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_FRONTEND_URL
        sync: false

