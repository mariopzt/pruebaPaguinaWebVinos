services:
  # Backend API
  - type: web
    name: catas-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backEnd
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: catas
    healthCheckPath: /api/health

  # Frontend (Static Site)
  - type: web
    name: catas-frontend
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

